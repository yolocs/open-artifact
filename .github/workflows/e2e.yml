name: Integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One integration workflow. Each scenario (surface x hosted/proxy x client use
# case) is its own step so a failure points straight at the broken scenario.
# Integration tests hit real clients and real upstreams by definition.
jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Python clients
        run: python -m pip install --upgrade pip twine
      - name: PyPI hosted - upload (twine)
        run: go test -race -tags=integration -run '^TestPyPIHostedUpload$' ./pkg/surface/pypi
      - name: PyPI hosted - download (pip)
        run: go test -race -tags=integration -run '^TestPyPIHostedDownload$' ./pkg/surface/pypi
      - name: PyPI proxy - download (pip, real pypi.org)
        run: go test -race -tags=integration -run '^TestPyPIProxyDownload$' ./pkg/surface/pypi

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: npm hosted - publish + install
        run: go test -race -tags=integration -run '^TestNPMHostedPublishAndInstall$' ./pkg/surface/npm
      - name: npm hosted - scoped publish + install
        run: go test -race -tags=integration -run '^TestNPMScopedPublishAndInstall$' ./pkg/surface/npm
      - name: npm hosted - dist-tags (add, ls)
        run: go test -race -tags=integration -run '^TestNPMDistTags$' ./pkg/surface/npm
      - name: npm proxy - install (in-process upstream)
        run: go test -race -tags=integration -run '^TestNPMProxyInstall$' ./pkg/surface/npm
      - name: npm proxy - download (real registry.npmjs.org)
        run: go test -race -tags=npmupstream -run '^TestProxyLiveUpstream$' ./pkg/surface/npm

  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Verify Maven client
        run: mvn -version
      - name: Maven hosted - deploy + dependency:get
        run: go test -race -tags=integration -run '^TestMavenDeployAndDependencyGet$' ./pkg/surface/maven
      - name: Maven proxy - dependency:get (in-process upstream)
        run: go test -race -tags=integration -run '^TestMavenProxyDependencyGet$' ./pkg/surface/maven
      - name: Maven proxy - download (real repo1.maven.org)
        run: go test -race -tags=mavenupstream -run '^TestProxyLiveUpstream$' ./pkg/surface/maven

  debian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify APT client
        run: apt-get --version && dpkg --print-architecture
      - name: Debian proxy - apt-get update + download (in-process upstream)
        run: go test -race -tags=integration -run '^TestDebianProxyAptGetDownload$' ./pkg/surface/debian

