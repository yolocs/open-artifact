name: Live Upstream

# Smoke-tests proxy mode against the real pypi.org. Runs on a schedule and on
# demand rather than per-PR, so flaky upstream/network never blocks merges while
# the real-Warehouse path is still exercised regularly.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Run live PyPI proxy smoke test
        run: go test -race -tags='integration pypiupstream' -run '^TestProxyLiveUpstreamPyPI$' ./pkg/surface/pypi
